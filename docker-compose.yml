version: "3.9"

services:
  bot:
    build: .
    env_file: .env
    volumes:
      - ./output:/app/output
      - ./data:/app/data
      - ./reports:/app/reports
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reports
      POSTGRES_PASSWORD: reports
      POSTGRES_DB: reports_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reports"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
