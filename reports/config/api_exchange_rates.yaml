name: "Daily Exchange Rates Report"
schedule: "every day at 06:00"
format: "excel"

source:
  type: "api"
  url: "https://open.er-api.com/v6/latest/USD"
  data_key: "rates"

transform:
  - type: "rename"
    columns:
      "key": "currency"
      "value": "rate_vs_usd"
  - type: "sort"
    by: "rate_vs_usd"
    ascending: true

delivery:
  recipients:
    - "finance@company.com"
  subject: "Daily Exchange Rates — {date_range}"
  body: "Please find attached today's exchange rates report for {date_range}."
  attach_file: true
